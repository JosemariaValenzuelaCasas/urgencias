# MINIKUBE FUNCIONA EN CODESPACE | LOCAL
# KUBECTL FUNCIONA DIRECTO EN KILLERCODA (SIN MINIKUBE)

# consultar versión de minikube
minikube version

# consultar si minikube esta en start o stop
minikube status

# iniciar clúster kubernetes
minikube start

# ingresar a la carpeta de los manifiestos de kubernetes (manifest)
cd manifest

# listar namespace
kubectl get namespace
kubectl get ns

# crear un namespace "josemaria" por comando mediante un archivo: "josemaria-valenzuela-41-namespace.yml"
kubectl apply -f josemaria-valenzuela-41-namespace.yml

# consultar namespace en uso por "default" | LINUX
kubectl config view --minify | grep namespace

# consultar namespace en uso por "default" | WINDOWS
kubectl config view --minify | findstr namespace

# cambiar un namespace en uso por "default" a "josemaria-valenzuela-41-namespace"
kubectl config set-context --current --namespace=josemaria-valenzuela-41-namespace

# consultar todos los recursos de un namespace "josemaria-valenzuela-41-namespace"
kubectl get all -n josemaria-valenzuela-41-namespace

# consultar todos los recursos y secret de un namespace "josemaria-valenzuela-41-namespace"
kubectl get all,secrets -n josemaria-valenzuela-41-namespace


# listar services del namespace "josemaria-valenzuela-41-namespace"
minikube service josemaria-valenzuela-41-service -n josemaria-valenzuela-41-namespace
minikube service list

# probar el microservicio dentro del clúster con curl
curl http://192.168.49.2:30001/api/huggingface/history
curl http://192.168.49.2:30001/api/gemini/history

# crear un túnel de puerto la máquina local (host) y el clúster de Kubernetes
kubectl port-forward service/josemaria-valenzuela-41-service 8085:30001


