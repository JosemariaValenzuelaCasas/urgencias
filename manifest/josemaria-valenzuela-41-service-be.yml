# kubectl apply -f josemaria-valenzuela-41-service-be.yml
apiVersion: v1
kind: Service
metadata:
  name: josemaria-valenzuela-41-service-be
  namespace: josemaria-valenzuela-41-namespace-be
spec:
  type: NodePort      #30000-32767  # Cambia a LoadBalancer si estás en un entorno de nube
  ports:
  - port: 30001     # Puerto que el Service expondrá
    targetPort: 8086  # Puerto en el contenedor donde tu aplicación escucha
    nodePort: 30001   # Puerto asignado en el nodo, opcional
  selector:
    app: josemaria-valenzuela-41-deployment-be  # Debe coincidir con las etiquetas del Deployment